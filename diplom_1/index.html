<!DOCTYPE html>
<html class="page" lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/index.css">
    <script src="./js/index.js" type="module"></script>
    <link rel="shortcut icon" href="./icons/logo.svg" type="image/x-icon">
    <title>Leader Classic</title>
</head>

<body class="page__body">
    <header class="header">
        <div class="container header__container">
            <div class="left-group">
                <a href="/" class="logo header__logo">
                    <img src="./icons/logo.svg" width="52" height="66" alt="Логотип Leader Classic" class="logo__img">
                    <div class="logo__text-wrapper">
                        <p class="logo__text logo__text-top">Leader</p>
                        <p class="logo__text logo__text-bottom">Classic</p>
                    </div>
                </a>
                <nav class="header__menu menu" aria-label="Основная навигация">
                    <ul class="menu__list">
                        <div class="header__lang-switcher lang-switcher" aria-label="Выбор языка">
                            <details class="lang-switcher__control">
                                <summary class="lang-switcher__current-lang">
                                    <svg class="lang__svg">
                                        <use class="lang__ru-icon" href="./icons/sprite.svg#ru-icon"></use>
                                    </svg>
                                    <p class="text-md">RU</p>
                                </summary>
                                <ul>
                                    <li><a href="/en" class="lang-switcher__link text-md">EN</a></li>
                                    <li><a href="/kz" class="lang-switcher__link text-md">KZ</a></li>
                                </ul>
                            </details>
                        </div>
                        <li class="menu__item"><a href="#" class="menu__link text-md">Тарифы</a></li>
                        <li class="menu__item"><a href="#" class="menu__link text-md">Бонус</a></li>
                        <li class="menu__item"><a href="#" class="menu__link text-md">Реферальная</a></li>
                        <li class="menu__item"><a href="#" class="menu__link text-md">Контакты</a> ✨</li>
                    </ul>
                </nav>
                <button class="header__burger burger" aria-label="Открыть меню" aria-expanded="false"
                    aria-controls="header__menu">
                    <svg class="burger__svg">
                        <use class="burger__icon-menu" href="./icons/sprite.svg#burger-menu"></use>
                        <use class="burger__icon-cross" href="./icons/sprite.svg#cross"></use>
                    </svg>
                </button>
            </div>
            <div class="right-group">
                <div class="header__controls">
                    <div class="header__actions">
                        <a href="#" class="header__button-login button button--bordered text-md"
                            aria-label="Войти">Войти</a>
                        <a href="#" class="header__button-create-acc button button--gradient text-lg-black"
                            aria-label="Открыть счет">Открыть счёт</a>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <main class="main">
        <section class="main section">
            <div class="container">

            </div>
        </section>
    </main>
    <footer class="footer">
        <div class="container footer__container">

        </div>
    </footer>
</body>

</html>
