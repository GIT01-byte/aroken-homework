<!DOCTYPE html>
<html class="page" lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/index.css">
    <title>Leader Classic</title>
</head>

<body class="page__body">
    <header class="header">
        <div class="container header__container">
            <!-- < 768px другое лого, уменьшенное бургер меню и кнопки -->
            <div class="left-group">
                <a class="logo header__logo">
                    <img src="./icons/logo.svg" alt="Логотип Leader Classic" class="logo__img">
                    <div class="logo__text-wrapper">
                        <p class="logo__text logo__text-top">Leader</p>
                        <p class="logo__text logo__text-bottom">Classic</p>
                    </div>
                </a>
                <nav class="header__menu menu">
                    <div class="header__lang-switcher lang-switcher">
                        <details class="lang-switcher__control">
                            <summary class="lang-switcher__current-lang">
                                <img src="./icons/ru-lang.svg" alt="Иконка Русского флага"
                                    class="lang-switcher__current-lang-icon">
                                <p class="text-md">RU</p>
                            </summary>
                            <ul>
                                <li><a href="/en" class="lang-switcher__link text-md">EN</a></li>
                                <li><a href="/kz" class="lang-switcher__link text-md">KZ</a></li>
                            </ul>
                        </details>
                    </div>
                    <ul class="menu__list">
                        <li class="menu__item text-md">Тарифы</li>
                        <li class="menu__item text-md">Бонус</li>
                        <li class="menu__item text-md">Реферальная</li>
                        <li class="menu__item text-md">Контакты ✨</li>
                    </ul>
                </nav>
                <button class="header__burger burger" aria-label="Открыть меню" aria-expanded="false"
                    aria-controls="header__menu">
                    <svg width="31" height="31">
                        <use class="burger__icon-menu" href="./icons/sprite.svg#burger-menu"></use>
                        <use class="burger__icon-cross" href="./icons/sprite.svg#cross"></use>
                    </svg>
                </button>
            </div>
            <div class="right-group">
                <div class="header__controls">
                    <div class="header__actions">
                        <a href="#" class="header__button-login button button--bordered text-md"
                            aria-label="Войти">Войти</a>
                        <a href="#" class="header__button-create-acc button button--gradiented text-lg-black"
                            aria-label="Открыть счет">Открыть счёт</a>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <main class="main">
        <section class="main section">
            <div class="container">

            </div>
        </section>
    </main>
    <footer class="footer">
        <div class="container footer__container">

        </div>
    </footer>
</body>

</html>
